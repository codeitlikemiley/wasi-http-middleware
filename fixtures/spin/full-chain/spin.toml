spin_manifest_version = 2

[application]
name = "wasi-http-middleware-full-chain"
version = "0.1.0-alpha.1"

[[trigger.http]]
route = "/..."
component = "application"
dependencies.middleware = [
  { component = "request-id" },
  { component = "security-headers" },
  { component = "cors", inherit_configuration = ["environment"] },
  { component = "authn-policy", inherit_configuration = ["environment", "allowed_outbound_hosts"] },
]

[component.application]
source = "../../../artifacts/test-components/echo-service.wasm"
allowed_outbound_hosts = ["http://127.0.0.1:19101"]

[component.application.environment]
WASI_MIDDLEWARE_CORS_ORIGINS = "https://app.example"
WASI_MIDDLEWARE_CORS_METHODS = "GET,HEAD,POST"
WASI_MIDDLEWARE_CORS_HEADERS = "content-type,authorization"
WASI_MIDDLEWARE_CORS_ALLOW_CREDENTIALS = "false"
WASI_MIDDLEWARE_AUTHN_BROKER_URL = "http://127.0.0.1:19101/authenticate"
WASI_MIDDLEWARE_AUTHN_TIMEOUT_MS = "2000"
WASI_MIDDLEWARE_AUTHN_MODE = "required"
WASI_MIDDLEWARE_SERVICE_ID = "echo-service"
WASI_MIDDLEWARE_AUTHN_AUDIENCES = "api://echo-service"
WASI_MIDDLEWARE_AUTHN_MAX_IN_FLIGHT = "64"
WASI_MIDDLEWARE_AUTHN_ALLOW_INSECURE_LOOPBACK = "true"

[component.request-id]
source = "../../../artifacts/components/request-id.wasm"

[component.security-headers]
source = "../../../artifacts/components/security-headers.wasm"

[component.cors]
source = "../../../artifacts/components/cors.wasm"

[component.authn-policy]
source = "../../../artifacts/components/authn-policy.wasm"
